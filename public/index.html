<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>湘阁里辣 · 不能隔夜菜品上报</title>
<style>
:root {
  --primary: #B22222; --gold: #C9A96E; --gold-light: #F5ECD7;
  --text: #2C2C2C; --text-light: #6B6B6B;
  --green: #2E7D32; --green-bg: #E8F5E9;
  --red: #C62828; --red-bg: #FFEBEE;
  --shadow: 0 1px 6px rgba(0,0,0,0.08);
}
* { margin:0; padding:0; box-sizing:border-box; }
body {
  font-family: -apple-system, BlinkMacSystemFont, "PingFang SC", "Microsoft YaHei", sans-serif;
  background: #f5f0eb; color: var(--text); min-height: 100vh;
}
.container { max-width: 560px; margin: 0 auto; min-height: 100vh; display: flex; flex-direction: column; }

/* ── Header ── */
.page-header {
  background: linear-gradient(135deg, #5C0A0A 0%, #9B1B1B 30%, #7A1212 70%, #5C0A0A 100%);
  color: #fff; padding: 10px 14px; display: flex; align-items: center; justify-content: space-between;
  border-bottom: 2px solid rgba(201,169,110,0.55); position: sticky; top: 0; z-index: 10;
  box-shadow: 0 2px 12px rgba(100,8,8,0.25);
}
.header-left { display: flex; align-items: center; gap: 8px; }
.header-left img { height: 26px; }
.header-left .ht { display: flex; flex-direction: column; }
.header-left .ht h1 { font-size: 15px; font-weight: 700; line-height: 1.3; }
.header-left .ht p { font-size: 10px; opacity: 0.8; color: var(--gold); line-height: 1.2; }
.header-btn { background: rgba(255,255,255,0.15); border: 1px solid rgba(255,255,255,0.3); color: #fff; padding: 5px 10px; border-radius: 6px; cursor: pointer; font-size: 12px; font-family: inherit; }
.header-btn:hover { background: rgba(255,255,255,0.25); }

/* ── Content fills everything ── */
.content-wrap { flex: 1; display: flex; flex-direction: column; }
.content-card { flex: 1; background: #fff; padding: 14px; }
.content-card.no-pad { padding: 0; }

/* ── Region pills ── */
.region-pills { display: flex; flex-wrap: wrap; gap: 6px; margin-bottom: 12px; }
.region-pill {
  flex: 1; min-width: calc(33.33% - 4px); text-align: center; padding: 10px 6px;
  border-radius: 10px; font-size: 13px; font-weight: 600; cursor: pointer;
  border: 2px solid #e8e8e8; background: #fff; transition: all .15s; font-family: inherit;
}
.region-pill:active { transform: scale(0.97); }
.region-pill.active { background: var(--primary); color: #fff; border-color: var(--primary); }
.region-pill .count { font-size: 10px; opacity: 0.6; display: block; margin-top: 1px; }

/* ── Store chips ── */
.store-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin-bottom: 8px; }
.store-chip {
  padding: 12px 8px; border-radius: 10px; font-size: 14px; font-weight: 600; cursor: pointer;
  border: 2px solid var(--gold-light); background: #fff; transition: all .15s; font-family: inherit; text-align: center;
}
.store-chip:active { transform: scale(0.97); }
.store-chip.selected { border-color: var(--primary); background: var(--red-bg); color: var(--primary); }

/* ── Dish cards ── */
.dish-list { display: grid; gap: 8px; margin-bottom: 12px; }
.dish-item {
  display: flex; align-items: center; justify-content: space-between;
  background: #faf8f5; border-radius: 10px; padding: 10px 12px; border: 1px solid #f0ede8;
}
.dish-item:active { background: #f0ece5; }
.dish-name { font-size: 15px; font-weight: 600; color: var(--text); flex: 1; }
.dish-input { display: flex; align-items: center; gap: 4px; }
.dish-input button {
  width: 30px; height: 30px; border: none; background: var(--primary); color: #fff;
  border-radius: 8px; font-size: 18px; cursor: pointer; display: flex; align-items: center; justify-content: center;
}
.dish-input button:active { opacity: 0.8; }
.dish-input input {
  width: 48px; text-align: center; font-size: 16px; font-weight: 700; padding: 5px;
  border: 2px solid #ddd; border-radius: 8px; outline: none; font-family: inherit;
  -moz-appearance: textfield;
}
.dish-input input:focus { border-color: var(--primary); }
.dish-input input::-webkit-outer-spin-button, .dish-input input::-webkit-inner-spin-button { -webkit-appearance: none; }

/* ── Buttons ── */
.btn { display: block; width: 100%; padding: 13px; font-size: 16px; font-weight: 700; border: none; border-radius: 10px; cursor: pointer; font-family: inherit; text-align: center; transition: all .2s; }
.btn-primary { background: linear-gradient(135deg, var(--primary), #D4443F); color: #fff; letter-spacing: 2px; box-shadow: 0 4px 12px rgba(178,34,34,0.25); }
.btn-primary:hover { transform: translateY(-1px); }
.btn-primary:disabled { background: #ccc; box-shadow: none; cursor: not-allowed; transform: none; }
.btn-secondary { background: #f5f5f5; color: var(--text); margin-top: 8px; }
.btn-secondary:hover { background: #e8e8e8; }
.btn-sm { padding: 5px 10px; font-size: 11px; border-radius: 6px; border: none; cursor: pointer; font-weight: 600; font-family: inherit; white-space: nowrap; }
.btn-red-sm { background: var(--primary); color: #fff; }
.btn-green-sm { background: var(--green); color: #fff; }
.btn-outline-sm { background: #fff; color: var(--primary); border: 1.5px solid var(--primary); }
.btn-ghost-sm { background: none; color: var(--text-light); border: none; cursor: pointer; }
.btn-ghost-sm:hover { color: var(--primary); }

/* ── Success ── */
.success-page { text-align: center; padding: 60px 20px; flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; }
.success-page .icon { width: 72px; height: 72px; border-radius: 50%; background: var(--green); display: flex; align-items: center; justify-content: center; margin: 0 auto 16px; font-size: 36px; color: #fff; }
.success-page h2 { font-size: 20px; color: var(--text); margin-bottom: 8px; }
.success-page p { font-size: 14px; color: var(--text-light); margin-bottom: 20px; line-height: 1.8; }

.loading { text-align: center; padding: 40px; color: var(--text-light); }
.error-box { background: var(--red-bg); border: 1px solid #ffcdd2; border-radius: 10px; padding: 14px; color: var(--red); font-size: 14px; margin-bottom: 12px; }
.form-label { font-size: 13px; font-weight: 600; color: var(--text); margin-bottom: 6px; display: block; }

/* ── Toast ── */
.toast { position: fixed; top: 56px; left: 50%; transform: translateX(-50%); z-index: 9999; background: #333; color: #fff; padding: 10px 20px; border-radius: 8px; font-size: 14px; opacity: 0; transition: opacity .3s; pointer-events: none; }
.toast.show { opacity: 1; }
.toast.error { background: var(--red); }

/* ── Setting page ── */
.setting-scroll { flex: 1; overflow-y: auto; padding: 14px; }
.setting-section { margin-bottom: 16px; }
.setting-section-title { font-size: 14px; font-weight: 600; color: var(--text); margin-bottom: 8px; }
.setting-row { display: flex; gap: 6px; align-items: center; margin-bottom: 6px; }
.setting-row input { flex: 1; padding: 7px 10px; border: 2px solid #e8e8e8; border-radius: 8px; font-size: 13px; outline: none; font-family: inherit; }
.setting-row input:focus { border-color: var(--primary); }
.setting-card {
  background: #faf8f5; border-radius: 10px; padding: 10px 12px; margin-bottom: 6px;
  display: flex; align-items: center; justify-content: space-between;
}
.setting-card .name { font-size: 14px; font-weight: 600; }
.setting-card .actions { display: flex; gap: 4px; flex-shrink: 0; }
.tag { display: inline-block; padding: 1px 6px; border-radius: 6px; font-size: 10px; font-weight: 600; }
.tag-on { background: var(--green-bg); color: var(--green); }
.tag-off { background: var(--red-bg); color: var(--red); }

/* ── Setting tabs (top) ── */
.setting-tabs {
  display: flex; background: #fff; border-bottom: 1px solid #eee; flex-shrink: 0;
}
.setting-tab {
  flex: 1; text-align: center; padding: 12px 6px; font-size: 13px; font-weight: 600;
  color: var(--text-light); cursor: pointer; border-bottom: 2px solid transparent;
  transition: all .2s;
}
.setting-tab.active { color: var(--primary); border-bottom-color: var(--primary); }
.setting-tab .tab-icon { font-size: 16px; display: block; margin-bottom: 2px; }

/* ── Back link ── */
.back-link {
  display: inline-flex; align-items: center; gap: 4px; color: var(--text-light);
  font-size: 12px; cursor: pointer; margin-bottom: 10px;
}
.back-link:hover { color: var(--primary); }
</style>
</head>
<body>
<div class="container" id="app">
  <div class="page-header" id="pageHeader">
    <div class="header-left" id="headerLeft">
      <img src="/logo.png" alt="湘阁里辣">
      <div class="ht">
        <h1 id="pageTitle">不能隔夜菜品上报</h1>
        <p id="pageSub"></p>
      </div>
    </div>
    <button class="header-btn" id="headerBtn" onclick="onHeaderBtn()">⚙️ 设置</button>
  </div>

  <div class="content-wrap" id="contentWrap">
    <div class="content-card" id="contentCard">
      <div id="mainContent" class="loading">加载中...</div>
    </div>
  </div>

  <!-- 设置顶部tab（仅设置页显示） -->
  <div id="settingTabs" style="display:none;" class="setting-tabs">
    <div class="setting-tab active" onclick="showSetting('stores')"><span class="tab-icon">🏪</span>门店</div>
    <div class="setting-tab" onclick="showSetting('dishes')"><span class="tab-icon">🍆</span>菜品</div>
    <div class="setting-tab" onclick="showSetting('robot')"><span class="tab-icon">🤖</span>机器人</div>
  </div>
</div>
<div class="toast" id="toast"></div>

<script>
var API='',TODAY=new Date().toISOString().split('T')[0];
var stores=[],dishes=[],regions=[],quantities={},selectedStoreId=null,selectedRegionId=null,submitting=false,currentPage='home';
var _sl=[],_dl=[],_rl=[];

function toast(m,e){var el=document.getElementById('toast');el.textContent=m;el.className='toast'+(e?' error':'');el.classList.add('show');setTimeout(function(){el.classList.remove('show')},2000);}
document.getElementById('pageSub').textContent=new Date().toLocaleDateString('zh-CN',{month:'long',day:'numeric'})+' · 20:00前填报';

async function api(u,o){o=o||{};var r=await fetch(API+u,o);var d=await r.json();if(!r.ok)throw new Error(d.error||'请求失败');return d;}

// ══════ 首页 ══════

async function goHome(){
  currentPage='home';
  document.getElementById('headerLeft').innerHTML='<img src="/logo.png" alt="湘阁里辣"><div class="ht"><h1>不能隔夜菜品上报</h1><p id="pageSub2"></p></div>';
  document.getElementById('pageSub2').textContent=new Date().toLocaleDateString('zh-CN',{month:'long',day:'numeric'})+' · 20:00前填报';
  document.getElementById('headerBtn').textContent='⚙️ 设置';
  document.getElementById('headerBtn').onclick=function(){goSetting()};
  document.getElementById('settingTabs').style.display='none';
  document.getElementById('contentCard').className='content-card';
  var m=document.getElementById('mainContent');
  try{
    var r=await Promise.all([fetch(API+'/api/stores'),fetch(API+'/api/dishes'),fetch(API+'/api/admin/regions')]);
    stores=await r[0].json();dishes=await r[1].json();regions=await r[2].json();
    if(!stores.length||!dishes.length){m.innerHTML='<div class="error-box">暂无可选门店或菜品，请联系管理员配置。</div>';return;}
    dishes.forEach(function(d){quantities[d.id]=0});
    if(!selectedRegionId&&regions.length)selectedRegionId=regions[0].id;
    renderHome();
  }catch(e){m.innerHTML='<div class="error-box">加载失败：'+e.message+'</div>';}
}

function renderHome(){
  var m=document.getElementById('mainContent');
  var pills=regions.map(function(r){
    var c=stores.filter(function(s){return Number(s.region_id)===r.id}).length;
    return '<button class="region-pill'+(Number(selectedRegionId)===r.id?' active':'')+'" onclick="selR('+r.id+')">'+r.name+'<span class="count">'+c+'家</span></button>';
  }).join('');

  if(selectedStoreId){
    var store=stores.find(function(s){return s.id===selectedStoreId});
    if(!store){selectedStoreId=null;renderHome();return;}
    var items=dishes.map(function(d){
      return '<div class="dish-item"><span class="dish-name">'+d.name+'</span><div class="dish-input">'+
        '<button onclick="chg('+d.id+',-1)">−</button>'+
        '<input type="number" id="q'+d.id+'" value="'+(quantities[d.id]||0)+'" min="0" onchange="onc('+d.id+',this.value)" onfocus="this.select()">'+
        '<button onclick="chg('+d.id+',1)">+</button></div></div>';
    }).join('');
    m.innerHTML='<div class="region-pills">'+pills+'</div>'+
      '<div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:10px;">'+
        '<span style="font-size:15px;font-weight:700;">🏪 '+store.name+'</span>'+
        '<button class="btn btn-outline-sm btn-sm" onclick="selectedStoreId=null;renderHome()" style="padding:4px 8px;">换门店</button>'+
      '</div>'+
      '<div class="form-label">📋 菜品剩余数量</div>'+
      '<p style="font-size:12px;color:var(--text-light);margin:-4px 0 8px;">卖完填0，无余量可不填</p>'+
      '<div class="dish-list">'+items+'</div>'+
      '<button class="btn btn-primary" id="btnSubmit" onclick="submit()">确认提交</button>';
  }else{
    var filtered=selectedRegionId?stores.filter(function(s){return Number(s.region_id)===Number(selectedRegionId)}):stores;
    var chips=filtered.map(function(s){
      return '<button class="store-chip" onclick="selS('+s.id+')">'+s.name+'</button>';
    }).join('');
    m.innerHTML='<div class="form-label">📋 选择区域</div><div class="region-pills">'+(pills||'<span style="color:#999;font-size:13px;">暂无区域</span>')+'</div>'+
      '<div class="form-label">🏪 选择门店</div>'+'<div class="store-grid">'+(chips||'<span style="color:#999;font-size:13px;">该区域暂无门店</span>')+'</div>';
  }
}
function selR(id){selectedRegionId=id;selectedStoreId=null;renderHome();}
function selS(id){selectedStoreId=id;renderHome();}
function chg(id,d){quantities[id]=Math.max(0,(quantities[id]||0)+d);var e=document.getElementById('q'+id);if(e)e.value=quantities[id];}
function onc(id,v){var n=parseInt(v,10);quantities[id]=isNaN(n)||n<0?0:n;var e=document.getElementById('q'+id);if(e)e.value=quantities[id];}

async function submit(){
  if(submitting||!selectedStoreId)return;submitting=true;
  var btn=document.getElementById('btnSubmit');btn.disabled=true;btn.textContent='提交中...';
  try{
    var store=stores.find(function(s){return s.id===selectedStoreId});if(!store)throw new Error('门店不存在');
    var items=dishes.map(function(d){return{dish_id:d.id,dish_name:d.name,quantity:quantities[d.id]||0}});
    var r=await fetch(API+'/api/submit',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({storeId:selectedStoreId,regionId:store.region_id||0,storeName:store.name,date:TODAY,items:items,submitTime:new Date().toLocaleString('zh-CN',{timeZone:'Asia/Shanghai'})})});
    var d=await r.json();
    if(d.success){
      document.getElementById('contentCard').className='content-card no-pad';
      document.getElementById('mainContent').innerHTML='<div class="success-page"><div class="icon">✅</div><h2>提交成功！</h2><p>门店「'+store.name+'」<br>今日数据已提交</p><button class="btn btn-primary" style="max-width:280px;" onclick="resetForm()">⬅ 返回填报</button><button class="btn btn-secondary" style="max-width:280px;" onclick="resetForm()">继续填报其他门店</button></div>';
    }else{alert('提交失败：'+(d.error||'未知错误'));btn.disabled=false;btn.textContent='确认提交';}
  }catch(e){alert('网络错误：'+e.message);btn.disabled=false;btn.textContent='确认提交';}
  submitting=false;
}
function resetForm(){dishes.forEach(function(d){quantities[d.id]=0});selectedStoreId=null;document.getElementById('contentCard').className='content-card';goHome();}

// ══════ 设置页 ══════

async function goSetting(){
  currentPage='setting';
  document.getElementById('headerLeft').innerHTML='<div class="ht"><h1>⚙️ 设置</h1><p style="font-size:10px;opacity:0.8;color:var(--gold);">管理门店、菜品与机器人</p></div>';
  document.getElementById('headerBtn').textContent='⬅ 返回填报';
  document.getElementById('headerBtn').onclick=function(){goHome()};
  document.getElementById('settingTabs').style.display='flex';
  document.getElementById('contentCard').className='content-card no-pad';
  document.getElementById('mainContent').innerHTML='<div class="loading">加载中...</div>';
  document.querySelectorAll('.setting-tab').forEach(function(t,i){t.classList.toggle('active',i===0)});
  await loadSetting('stores');
}

function showSetting(tab){
  document.querySelectorAll('.setting-tab').forEach(function(t){t.classList.toggle('active',t.textContent.includes({'stores':'门店','dishes':'菜品','robot':'机器人'}[tab]));});
  document.getElementById('mainContent').innerHTML='<div class="loading">加载中...</div>';
  loadSetting(tab);
}

async function loadSetting(tab){
  var m=document.getElementById('mainContent');
  try{
    _sl=await api('/api/admin/stores');_dl=await api('/api/admin/dishes');_rl=await api('/api/admin/regions');
    m.innerHTML='<div class="setting-scroll">'+
      (tab==='stores'?renderStores():tab==='dishes'?renderDishes():renderRobot())+
      '</div>';
  }catch(e){m.innerHTML='<div class="error-box" style="margin:14px;">加载失败：'+e.message+'</div>';}
}

function renderStores(){
  var h='<div class="setting-section"><div class="setting-section-title">➕ 新增区域</div><div class="setting-row"><input id="newR" placeholder="区域名称" onkeydown="if(event.key===\'Enter\')addR()"><button class="btn btn-red-sm btn-sm" onclick="addR()">新增</button></div></div>';
  _rl.forEach(function(r){
    var rs=_sl.filter(function(s){return Number(s.region_id)===r.id});
    h+='<div style="background:#faf8f5;border-radius:10px;padding:10px 12px;margin-bottom:8px;">'+
      '<div style="font-weight:700;margin-bottom:6px;">📍 '+r.name+'</div>'+
      '<div class="setting-row"><input id="ns_'+r.id+'" placeholder="门店名称" onkeydown="if(event.key===\'Enter\')addS('+r.id+')"><button class="btn btn-green-sm btn-sm" onclick="addS('+r.id+')">+门店</button></div>';
    rs.forEach(function(s){h+='<div class="setting-card" style="margin:4px 0;"><span class="name" style="font-size:13px;">'+s.name+' <span class="tag '+(s.active?'tag-on':'tag-off')+'">'+(s.active?'启用':'停用')+'</span></span><span class="actions"><button class="btn btn-outline-sm btn-sm" onclick="editS('+s.id+')">✎</button><button class="btn btn-outline-sm btn-sm" onclick="togS('+s.id+')">'+(s.active?'停用':'启用')+'</button><button class="btn btn-ghost-sm btn-sm" onclick="delS('+s.id+')">✕</button></span></div>';});
    if(!rs.length)h+='<div style="color:#bbb;font-size:12px;margin:4px 0;">暂无门店</div>';
    h+='</div>';
  });
  h+='<div style="text-align:center;"><button class="btn btn-ghost-sm btn-sm" onclick="loadSetting(\'stores\')">🔄 刷新</button></div>';
  return h;
}

function renderDishes(){
  var items=_dl.map(function(d){return '<div class="setting-card"><span class="name">'+d.name+' <span class="tag '+(d.active?'tag-on':'tag-off')+'">'+(d.active?'启用':'停用')+'</span></span><span class="actions"><button class="btn btn-outline-sm btn-sm" onclick="editD('+d.id+')">✎</button><button class="btn btn-outline-sm btn-sm" onclick="togD('+d.id+')">'+(d.active?'停用':'启用')+'</button><button class="btn btn-ghost-sm btn-sm" onclick="delD('+d.id+')">✕</button></span></div>';}).join('');
  return '<div class="setting-section"><div class="setting-section-title">➕ 新增菜品</div><div class="setting-row"><input id="newD" placeholder="菜品名称" onkeydown="if(event.key===\'Enter\')addD()"><button class="btn btn-green-sm btn-sm" onclick="addD()">新增</button></div>'+(items||'<div style="color:#999;font-size:13px;">暂无菜品</div>')+'</div><div style="text-align:center;"><button class="btn btn-ghost-sm btn-sm" onclick="loadSetting(\'dishes\')">🔄 刷新</button></div>';
}

function renderRobot(){
  if(!window._whU){
    return '<div style="padding:30px 20px;text-align:center;"><div style="font-size:32px;margin-bottom:12px;">🔒</div><div style="font-size:16px;font-weight:600;color:var(--primary);margin-bottom:10px;">修改机器人设置</div><input id="whA" placeholder="我是谁？" style="width:200px;padding:8px 12px;border:2px solid #e8e8e8;border-radius:8px;font-size:15px;outline:none;font-family:inherit;text-align:center;" onkeydown="if(event.key===\'Enter\')unlockR()"><div style="margin-top:8px;"><button class="btn btn-outline-sm btn-sm" onclick="unlockR()" style="padding:8px 24px;">验证</button></div><div id="whErr" style="font-size:12px;color:var(--red);margin-top:6px;"></div></div>';
  }
  var items=_rl.map(function(r){return '<div class="setting-card" style="flex-direction:column;align-items:stretch;gap:8px;margin-bottom:8px;"><div style="display:flex;justify-content:space-between;align-items:center;"><span class="name">📍 '+r.name+'</span><span class="tag '+(r.webhook_url?'tag-on':'tag-off')+'">'+(r.webhook_url?'已配置':'未配置')+'</span></div><div class="setting-row"><input id="wh_'+r.id+'" value="'+(r.webhook_url||'').replace(/"/g,'&quot;')+'" placeholder="Webhook 地址" style="flex:1;padding:7px 10px;border:2px solid #e8e8e8;border-radius:8px;font-size:13px;outline:none;font-family:inherit;"><button class="btn btn-green-sm btn-sm" onclick="saveWH('+r.id+')">保存</button><button class="btn btn-outline-sm btn-sm" onclick="testWH('+r.id+')"'+(r.webhook_url?'':' disabled')+'>测试</button></div></div>';}).join('');
  return '<div style="font-size:12px;color:var(--text-light);margin-bottom:12px;">每个区域独立配置企微机器人，提醒和汇总自动推送到对应群。</div>'+(items||'<div style="color:#999;font-size:13px;">暂无区域</div>')+'<div style="text-align:center;margin-top:8px;"><button class="btn btn-ghost-sm btn-sm" onclick="lockR()">🔒 锁定</button><button class="btn btn-ghost-sm btn-sm" onclick="loadSetting(\'robot\')" style="margin-left:8px;">🔄 刷新</button></div>';
}

function unlockR(){var i=document.getElementById('whA'),e=document.getElementById('whErr');if(!i)return;if(i.value.trim()==='无敌小帅'){window._whU=true;loadSetting('robot');}else{e.textContent='暗号不对哦～';}}
function lockR(){window._whU=false;loadSetting('robot');}

async function addR(){var i=document.getElementById('newR'),n=i.value.trim();if(!n)return toast('请输入区域名称');try{await api('/api/admin/regions',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({name:n})});i.value='';toast('添加成功');loadSetting('stores');}catch(e){toast('添加失败：'+e.message,true);}}
async function addS(rid){var i=document.getElementById('ns_'+rid),n=i.value.trim();if(!n)return toast('请输入门店名称');try{await api('/api/admin/stores',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({name:n,region_id:rid})});i.value='';toast('添加成功');loadSetting('stores');refreshStores();}catch(e){toast('添加失败：'+e.message,true);}}
function editS(id){var s=_sl.find(function(x){return x.id===id});if(!s)return;var nn=prompt('修改门店名称：',s.name);if(nn&&nn.trim())saveS(id,nn.trim());}
async function saveS(id,n){try{await api('/api/admin/stores/'+id,{method:'PUT',headers:{'Content-Type':'application/json'},body:JSON.stringify({name:n})});toast('修改成功');loadSetting('stores');refreshStores();}catch(e){toast('修改失败：'+e.message,true);}}
async function togS(id){try{await api('/api/admin/stores/'+id+'/toggle',{method:'PUT'});toast('状态已切换');loadSetting('stores');refreshStores();}catch(e){toast('操作失败：'+e.message,true);}}
async function delS(id){var s=_sl.find(function(x){return x.id===id});if(!s)return;if(!confirm('确定删除「'+s.name+'」吗？'))return;try{await api('/api/admin/stores/'+id,{method:'DELETE'});toast('已删除');loadSetting('stores');refreshStores();}catch(e){toast('删除失败：'+e.message,true);}}
async function addD(){var i=document.getElementById('newD'),n=i.value.trim();if(!n)return toast('请输入菜品名称');try{await api('/api/admin/dishes',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({name:n})});i.value='';toast('添加成功');loadSetting('dishes');}catch(e){toast('添加失败：'+e.message,true);}}
function editD(id){var d=_dl.find(function(x){return x.id===id});if(!d)return;var nn=prompt('修改菜品名称：',d.name);if(nn&&nn.trim())saveD(id,nn.trim());}
async function saveD(id,n){try{await api('/api/admin/dishes/'+id,{method:'PUT',headers:{'Content-Type':'application/json'},body:JSON.stringify({name:n})});toast('修改成功');loadSetting('dishes');}catch(e){toast('修改失败：'+e.message,true);}}
async function togD(id){try{await api('/api/admin/dishes/'+id+'/toggle',{method:'PUT'});toast('状态已切换');loadSetting('dishes');}catch(e){toast('操作失败：'+e.message,true);}}
async function delD(id){var d=_dl.find(function(x){return x.id===id});if(!d)return;if(!confirm('确定删除「'+d.name+'」吗？'))return;try{await api('/api/admin/dishes/'+id,{method:'DELETE'});toast('已删除');loadSetting('dishes');}catch(e){toast('删除失败：'+e.message,true);}}
async function saveWH(id){var i=document.getElementById('wh_'+id);if(!i)return;var u=i.value.trim(),r=_rl.find(function(x){return x.id===id});if(!r)return;try{await api('/api/admin/regions/'+id,{method:'PUT',headers:{'Content-Type':'application/json'},body:JSON.stringify({name:r.name,webhook_url:u})});toast('Webhook 已保存');}catch(e){toast('保存失败：'+e.message,true);}}
async function testWH(id){try{var r=await api('/api/admin/regions/'+id+'/test-webhook',{method:'POST'});toast(r.success?'✅ 测试消息发送成功！请查看企微群':'❌'+(r.error||'发送失败'));}catch(e){toast('❌'+e.message,true);}}
async function refreshStores(){try{var r=await fetch(API+'/api/stores');stores=await r.json();}catch(_){}}

goHome();
</script>
