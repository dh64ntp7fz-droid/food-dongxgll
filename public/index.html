<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>湘阁里辣 · 不能隔夜菜品上报</title>
<style>
:root{--p:#B22222;--g:#C9A96E;--t:#1a1a1a;--t2:#666;--gr:#2E7D32;--g-bg:#E8F5E9;--r:#C62828;--r-bg:#FFEBEE;--bg:#f2eee9;--c:#fff;--r:10px}
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,BlinkMacSystemFont,"PingFang SC","Microsoft YaHei",sans-serif;background:var(--bg);color:var(--t);-webkit-font-smoothing:antialiased}
.app{max-width:480px;margin:0 auto;min-height:100vh;display:flex;flex-direction:column}
/* Top */
.top{background:linear-gradient(135deg,#5C0A0A 0%,#9B1B1B 30%,#7A1212 70%,#5C0A0A 100%);color:#fff;padding:10px 14px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:10;border-bottom:1px solid rgba(201,169,110,.4);box-shadow:0 2px 8px rgba(100,8,8,.2)}
.top-l{display:flex;align-items:center;gap:8px}.top-l img{height:24px}
.top-l .t{line-height:1.2}.top-l .t h1{font-size:15px;font-weight:700}.top-l .t p{font-size:10px;color:var(--g);opacity:.85}
.top-btn{padding:4px 10px;border-radius:6px;border:1px solid rgba(255,255,255,.3);background:rgba(255,255,255,.12);color:#fff;font-size:12px;cursor:pointer;font-family:inherit}
.top-btn:active{background:rgba(255,255,255,.25)}
/* Setting tabs - at top */
.stabs{display:none;background:var(--c);border-bottom:1px solid #eee;flex-shrink:0}
.stab{flex:1;text-align:center;padding:11px 4px;font-size:13px;font-weight:600;color:var(--t2);cursor:pointer;border-bottom:2px solid transparent;transition:all .12s}
.stab.act{color:var(--p);border-bottom-color:var(--p)}
/* Body */
.body{flex:1;overflow-y:auto;padding:12px 14px;display:flex;flex-direction:column;gap:8px}
.body-s{flex:1;overflow-y:auto;display:flex;flex-direction:column}
/* Region */
.region-grid{display:grid;grid-template-columns:1fr 1fr 1fr;gap:6px}
.region-i{padding:10px 4px;border-radius:var(--r);text-align:center;font-size:13px;font-weight:600;border:1.5px solid #ddd;background:var(--c);cursor:pointer;font-family:inherit;transition:all .1s;line-height:1.2}
.region-i:active{transform:scale(.96)}
.region-i.act{border-color:var(--p);background:var(--p);color:#fff}
.region-i .c{font-size:10px;opacity:.6;display:block;margin-top:1px}
.region-i.act .c{opacity:.7}
/* Store */
.store-grid{display:grid;grid-template-columns:1fr 1fr;gap:6px}
.store-i{padding:14px 8px;border-radius:var(--r);text-align:center;font-size:14px;font-weight:600;border:1.5px solid #ddd;background:var(--c);cursor:pointer;font-family:inherit;transition:all .1s}
.store-i:active{transform:scale(.96)}
.store-i.act{border-color:var(--p);background:var(--r-bg);color:var(--p)}
/* Dish */
.dish-list{display:flex;flex-direction:column;gap:5px;margin-bottom:8px}
.dish-i{display:flex;align-items:center;justify-content:space-between;background:var(--c);border-radius:var(--r);padding:10px 10px;border:1px solid #eeeae5}
.dish-n{display:flex;align-items:center;gap:6px;font-size:15px;font-weight:600}
.dish-tag{font-size:10px;padding:1px 6px;border-radius:4px;font-weight:600}
.dish-tag.tg{background:#FFF3E0;color:#E65100}
.dish-tag.ntg{background:#E3F2FD;color:#1565C0}
.dish-tag.all{background:#f0ece5;color:#666}
.dish-q{display:flex;align-items:center;gap:4px}
.dish-q button{width:30px;height:30px;border:none;background:var(--p);color:#fff;border-radius:7px;font-size:18px;cursor:pointer;display:flex;align-items:center;justify-content:center}
.dish-q button:active{opacity:.8}
.dish-q input{width:46px;text-align:center;font-size:16px;font-weight:700;padding:4px;border:1.5px solid #ddd;border-radius:7px;outline:none;font-family:inherit;-moz-appearance:textfield}
.dish-q input:focus{border-color:var(--p)}
.dish-q input::-webkit-outer-spin-button,.dish-q input::-webkit-inner-spin-button{-webkit-appearance:none}
/* Buttons */
.btn-p{width:100%;padding:14px;font-size:16px;font-weight:700;border:none;border-radius:var(--r);background:linear-gradient(135deg,var(--p),#D4443F);color:#fff;cursor:pointer;font-family:inherit;letter-spacing:2px;box-shadow:0 4px 12px rgba(178,34,34,.25)}
.btn-p:active{transform:scale(.98)}.btn-p:disabled{background:#ccc;box-shadow:none;cursor:default;transform:none}
.btn-s{width:100%;padding:12px;font-size:15px;font-weight:600;border:none;border-radius:var(--r);background:#f2eee9;color:var(--t);cursor:pointer;font-family:inherit;margin-top:6px}
.btn-s:active{background:#e5e0d9}
.sl{font-size:12px;font-weight:600;color:var(--t2);margin-bottom:4px;display:flex;align-items:center;gap:4px}
.st{display:flex;align-items:center;justify-content:space-between;margin-bottom:4px}
.st-l{display:flex;align-items:center;gap:4px}.st-l .n{font-size:15px;font-weight:700}
.st .b{font-size:12px;padding:3px 8px;border-radius:5px;border:1px solid var(--p);background:none;color:var(--p);cursor:pointer;font-family:inherit}
/* Success */
.succ{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:40px 20px;text-align:center}
.succ .i{width:72px;height:72px;border-radius:50%;background:var(--gr);display:flex;align-items:center;justify-content:center;margin-bottom:14px;font-size:36px;color:#fff}
.succ h2{font-size:20px;margin-bottom:6px}.succ p{font-size:14px;color:var(--t2);margin-bottom:20px;line-height:1.7}
.succ .btn-p,.succ .btn-s{max-width:260px}
/* Setting */
.set-body{padding:14px;flex:1;overflow-y:auto}
.set-sec{margin-bottom:16px}.set-sec-t{font-size:13px;font-weight:600;color:var(--t);margin-bottom:8px}
.set-r{display:flex;gap:6px;align-items:center;margin-bottom:6px}
.set-r input{flex:1;padding:7px 10px;border:1.5px solid #ddd;border-radius:7px;font-size:13px;outline:none;font-family:inherit}
.set-r input:focus{border-color:var(--p)}
.set-c{background:var(--bg);border-radius:8px;padding:8px 10px;margin-bottom:4px;display:flex;align-items:center;justify-content:space-between}
.set-c .n{font-size:13px;font-weight:600}
.set-c .ac{display:flex;gap:4px;flex-shrink:0}
.set-c .ac button{padding:3px 8px;font-size:11px;border-radius:5px;border:none;cursor:pointer;font-weight:600;font-family:inherit}
.set-c .ac .b1{background:var(--p);color:#fff}
.set-c .ac .b2{background:var(--c);color:var(--p);border:1px solid var(--p)}
.set-c .ac .b3{background:none;color:var(--t2)}
.set-c .ac select{padding:3px 6px;font-size:11px;border-radius:5px;border:1px solid #ddd;font-family:inherit;outline:none}
.region-box{background:var(--bg);border-radius:var(--r);padding:10px 12px;margin-bottom:10px}
.region-box .rh{font-weight:700;font-size:14px;margin-bottom:6px}
.tag{display:inline-block;padding:1px 6px;border-radius:5px;font-size:10px;font-weight:600}
.tag-o{background:var(--g-bg);color:var(--gr)}.tag-x{background:var(--r-bg);color:var(--r)}
.err{background:var(--r-bg);border:1px solid #ffcdd2;border-radius:var(--r);padding:12px;color:var(--r);font-size:14px}
.load{text-align:center;padding:40px;color:var(--t2);font-size:14px}
.toast{position:fixed;top:50px;left:50%;transform:translateX(-50%);z-index:9999;background:#333;color:#fff;padding:9px 18px;border-radius:8px;font-size:13px;opacity:0;transition:opacity .25s;pointer-events:none}
.toast.s{opacity:1}.toast.e{background:var(--r)}
</style>
</head>
<body>
<div class="app" id="app">
  <div class="top">
    <div class="top-l" id="topL">
      <img src="/logo.png" alt="湘阁里辣">
      <div class="t"><h1 id="pgTitle">不能隔夜菜品上报</h1><p id="pgSub"></p></div>
    </div>
    <button class="top-btn" id="topBtn" onclick="onBtn()">⚙️ 设置</button>
  </div>
  <div class="stabs" id="stabs">
    <div class="stab act" onclick="sTab('stores')">🏪 门店</div>
    <div class="stab" onclick="sTab('dishes')">🍆 菜品</div>
    <div class="stab" onclick="sTab('robot')">🤖 机器人</div>
  </div>
  <div class="body" id="bw"><div id="main"></div></div>
</div>
<div class="toast" id="toast"></div>

<script>
var A='',T=new Date().toISOString().split('T')[0],
  _s=[],_d=[],_r=[],q={},sid=null,rid=null,ing=false,pg='home',
  _sl=[],_dl=[],_rl=[];
function tt(m,e){var el=document.getElementById('toast');el.textContent=m;el.className='toast'+(e?' e':'')+' s';setTimeout(function(){el.className='toast'},2000)}
document.getElementById('pgSub').textContent=new Date().toLocaleDateString('zh-CN',{month:'long',day:'numeric'})+' · 20:00前填报';
async function api(u,o){o=o||{};var r=await fetch(A+u,o);var d=await r.json();if(!r.ok)throw new Error(d.error||'请求失败');return d}

function onBtn(){
  if(pg==='home'){pg='set';document.getElementById('stabs').style.display='flex';
    document.getElementById('topL').innerHTML='<div class="t"><h1>⚙️ 设置</h1><p style="font-size:10px;opacity:.8;color:var(--g)">门店 · 菜品 · 机器人</p></div>';
    document.getElementById('topBtn').textContent='⬅ 填报';document.getElementById('bw').className='body-s';
    document.getElementById('main').innerHTML='<div class="load">加载中...</div>';
    document.querySelectorAll('.stab').forEach(function(t,i){t.classList.toggle('act',i===0)});lSet('stores')
  }else{
    pg='home';document.getElementById('stabs').style.display='none';
    document.getElementById('topL').innerHTML='<img src="/logo.png" alt="湘阁里辣"><div class="t"><h1>不能隔夜菜品上报</h1><p id="pgSub2"></p></div>';
    document.getElementById('pgSub2').textContent=new Date().toLocaleDateString('zh-CN',{month:'long',day:'numeric'})+' · 20:00前填报';
    document.getElementById('topBtn').textContent='⚙️ 设置';document.getElementById('bw').className='body';home()
  }
}

// ══════ 首页 ══════
async function home(){
  try{
    var rr=await Promise.all([fetch(A+'/api/stores'),fetch(A+'/api/dishes'),fetch(A+'/api/admin/regions')]);
    _s=await rr[0].json();_d=await rr[1].json();_r=await rr[2].json();
    if(!_s.length||!_d.length){document.getElementById('main').innerHTML='<div class="err">暂无可选门店或菜品，请联系管理员配置。</div>';return}
    _d.forEach(function(d){q[d.id]=0});if(!rid&&_r.length)rid=_r[0].id;draw();
  }catch(e){document.getElementById('main').innerHTML='<div class="err">加载失败：'+e.message+'</div>'}
}

function draw(){
  var m=document.getElementById('main');
  var rg=_r.map(function(r){var c=_s.filter(function(s){return Number(s.region_id)===r.id}).length;return'<div class="region-i'+(Number(rid)===r.id?' act':'')+'" onclick="sr('+r.id+')">'+r.name+'<span class="c">'+c+'家</span></div>'}).join('');
  if(sid){
    var st=_s.find(function(s){return s.id===sid});if(!st){sid=null;draw();return}
    var gs={调改店:[],非调改店:[],通用:[]};
    _d.forEach(function(d){var g=d.dish_group||'通用';if(!gs[g])gs[g]=[];gs[g].push(d)});
    var di='';
    Object.keys(gs).forEach(function(g){
      if(!gs[g].length)return;
      var tagCls={调改店:'tg',非调改店:'ntg',通用:'all'}[g]||'all';
      var tagTxt={调改店:'调改',非调改店:'非调',通用:'全部'}[g]||g;
      di+='<div style="font-size:11px;font-weight:600;color:var(--t2);margin:4px 0 2px">▸ '+g+'</div>';
      gs[g].forEach(function(d){di+='<div class="dish-i"><span class="dish-n">'+d.name+'<span class="dish-tag '+tagCls+'">'+tagTxt+'</span></span><div class="dish-q"><button onclick="cq('+d.id+',-1)">−</button><input type="number" id="q'+d.id+'" value="'+(q[d.id]||0)+'" min="0" onchange="oc('+d.id+',this.value)" onfocus="this.select()"><button onclick="cq('+d.id+',1)">+</button></div></div>'});
    });
    m.innerHTML='<div class="region-grid">'+rg+'</div><div class="st"><div class="st-l"><span class="n">🏪 '+st.name+'</span></div><button class="b" onclick="sid=null;draw()">换门店</button></div><div class="sl">📋 剩余数量</div><div class="dish-list">'+di+'</div><button class="btn-p" id="btnS" onclick="sub()">确认提交</button>';
  }else{
    var fd=rid?_s.filter(function(s){return Number(s.region_id)===Number(rid)}):_s;
    var sg=fd.map(function(s){return'<div class="store-i" onclick="ss('+s.id+')">'+s.name+'</div>'}).join('');
    m.innerHTML='<div class="sl">📋 区域</div><div class="region-grid">'+rg+'</div><div class="sl" style="margin-top:10px">🏪 门店</div><div class="store-grid">'+(sg||'<div style="color:#999;font-size:13px;grid-column:1/-1">暂无门店</div>')+'</div>';
  }
}
function sr(id){rid=Number(id);sid=null;draw()}
function ss(id){sid=Number(id);draw()}
function cq(id,d){q[id]=Math.max(0,(q[id]||0)+d);var e=document.getElementById('q'+id);if(e)e.value=q[id]}
function oc(id,v){var n=parseInt(v,10);q[id]=isNaN(n)||n<0?0:n;var e=document.getElementById('q'+id);if(e)e.value=q[id]}

async function sub(){
  if(ing||!sid)return;ing=true;var btn=document.getElementById('btnS');btn.disabled=true;btn.textContent='提交中...';
  try{
    var st=_s.find(function(s){return s.id===sid});if(!st)throw new Error('门店不存在');
    var it=_d.map(function(d){return{dish_id:d.id,dish_name:d.name,quantity:q[d.id]||0}});
    var rr=await fetch(A+'/api/submit',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({storeId:sid,regionId:st.region_id||0,storeName:st.name,date:T,items:it,submitTime:new Date().toLocaleString('zh-CN',{timeZone:'Asia/Shanghai'})})});
    var d=await rr.json();
    if(d.success){
      document.getElementById('bw').className='body-s';document.getElementById('main').innerHTML='<div class="succ"><div class="i">✅</div><h2>提交成功！</h2><p>门店「'+st.name+'」<br>今日数据已提交</p><button class="btn-p" onclick="rst()">⬅ 返回填报</button><button class="btn-s" onclick="rst()">继续填报其他门店</button></div>';
    }else{alert('提交失败：'+(d.error||'未知错误'));btn.disabled=false;btn.textContent='确认提交'}
  }catch(e){alert('网络错误：'+e.message);btn.disabled=false;btn.textContent='确认提交'}
  ing=false
}
function rst(){_d.forEach(function(d){q[d.id]=0});sid=null;document.getElementById('bw').className='body';home()}

// ══════ 设置 ══════
function sTab(t){
  document.querySelectorAll('.stab').forEach(function(x){
    x.classList.toggle('act',x.textContent.includes({stores:'门店',dishes:'菜品',robot:'机器人'}[t]))
  });
  document.getElementById('main').innerHTML='<div class="load">加载中...</div>';lSet(t)
}
async function lSet(t){
  try{_sl=await api('/api/admin/stores');_dl=await api('/api/admin/dishes');_rl=await api('/api/admin/regions');
    document.getElementById('main').innerHTML='<div class="set-body">'+(t==='stores'?rStores():t==='dishes'?rDishes():rRobot())+'</div>'
  }catch(e){document.getElementById('main').innerHTML='<div class="err" style="margin:14px">'+e.message+'</div>'}
}

function rStores(){
  var h='<div class="set-sec"><div class="set-sec-t">➕ 新增区域</div><div class="set-r"><input id="nR" placeholder="区域名称" onkeydown="if(event.key===\'Enter\')aR()"><button class="b1" onclick="aR()" style="padding:7px 14px;font-size:12px;border-radius:7px;border:none;background:var(--p);color:#fff;cursor:pointer;font-weight:600;font-family:inherit;white-space:nowrap">新增</button></div></div>';
  _rl.forEach(function(r){
    var rs=_sl.filter(function(s){return Number(s.region_id)===r.id});
    h+='<div class="region-box"><div class="rh">📍 '+r.name+'</div><div class="set-r"><input id="ns_'+r.id+'" placeholder="店名" onkeydown="if(event.key===\'Enter\')aS('+r.id+')"><button class="b1" onclick="aS('+r.id+')" style="padding:5px 10px;font-size:11px;border-radius:5px;border:none;background:var(--gr);color:#fff;cursor:pointer;font-weight:600;font-family:inherit;white-space:nowrap">+门店</button></div>';
    rs.forEach(function(s){h+='<div class="set-c"><span class="n">'+s.name+' <span class="tag '+(s.active?'tag-o':'tag-x')+'">'+(s.active?'启用':'停用')+'</span></span><span class="ac"><button class="b2" onclick="eS('+s.id+')">编辑</button><button class="b2" onclick="tS('+s.id+')">'+(s.active?'停用':'启用')+'</button><button class="b3" onclick="dS('+s.id+')">✕</button></span></div>'});
    if(!rs.length)h+='<div style="color:#bbb;font-size:12px;margin:4px 0;">暂无门店</div>';
    h+='</div>'
  });
  h+='<div style="text-align:center;margin-top:4px"><button class="b3" onclick="lSet(\'stores\')" style="padding:4px 10px;border:none;background:none;color:var(--t2);cursor:pointer;font-size:12px;font-family:inherit">🔄 刷新</button></div>';return h
}

function rDishes(){
  var it=_dl.map(function(d){return'<div class="set-c" style="flex-wrap:wrap;gap:4px"><span class="n">'+d.name+' <span class="tag '+(d.active?'tag-o':'tag-x')+'">'+(d.active?'启用':'停用')+'</span></span><span class="ac"><select id="dg_'+d.id+'" style="padding:3px 6px;font-size:11px;border-radius:5px;border:1px solid #ddd;font-family:inherit;outline:none"><option value="调改店"'+(d.dish_group==='调改店'?' selected':'')+'>调改</option><option value="非调改店"'+(d.dish_group==='非调改店'?' selected':'')+'>非调</option><option value="通用"'+(d.dish_group==='通用'||!d.dish_group?' selected':'')+'>通用</option></select><button class="b2" onclick="eD('+d.id+')">改名</button><button class="b2" onclick="tD('+d.id+')">'+(d.active?'停用':'启用')+'</button><button class="b3" onclick="dD('+d.id+')">✕</button></span></div>'}).join('');
  return'<div class="set-sec"><div class="set-sec-t">➕ 新增菜品</div><div class="set-r" style="flex-wrap:wrap"><input id="nD" placeholder="菜品名称" style="flex:1;min-width:120px" onkeydown="if(event.key===\'Enter\')aD()"><select id="nDg" style="padding:7px 10px;border:1.5px solid #ddd;border-radius:7px;font-size:13px;outline:none;font-family:inherit"><option value="调改店">调改店</option><option value="非调改店">非调改店</option><option value="通用" selected>通用</option></select><button class="b1" onclick="aD()" style="padding:7px 14px;font-size:12px;border-radius:7px;border:none;background:var(--gr);color:#fff;cursor:pointer;font-weight:600;font-family:inherit;white-space:nowrap">新增</button></div>'+(it||'<div style="color:#999;font-size:13px">暂无菜品</div>')+'</div><div style="text-align:center;margin-top:4px"><button class="b3" onclick="lSet(\'dishes\')" style="padding:4px 10px;border:none;background:none;color:var(--t2);cursor:pointer;font-size:12px;font-family:inherit">🔄 刷新</button></div>'
}

function rRobot(){
  if(!window._whU)return'<div style="padding:30px 20px;text-align:center"><div style="font-size:32px;margin-bottom:10px">🔒</div><div style="font-size:16px;font-weight:600;color:var(--p);margin-bottom:10px">修改机器人设置</div><input id="wA" placeholder="我是谁？" style="width:200px;padding:8px 12px;border:1.5px solid #ddd;border-radius:8px;font-size:15px;outline:none;font-family:inherit;text-align:center" onkeydown="if(event.key===\'Enter\')uR()"><div style="margin-top:8px"><button class="b2" onclick="uR()" style="padding:6px 24px;font-size:13px;border-radius:6px;border:1.5px solid var(--p);background:var(--c);color:var(--p);cursor:pointer;font-weight:600;font-family:inherit">验证</button></div><div id="wE" style="font-size:12px;color:var(--r);margin-top:6px"></div></div>';
