<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>湘阁里辣 · 后台管理</title>
<style>
:root {
  --bg: #FDF8F0; --card-bg: #FFFFFF; --primary: #B22222;
  --gold: #C9A96E; --gold-light: #F5ECD7; --text: #2C2C2C;
  --text-light: #6B6B6B; --green: #2E7D32; --green-bg: #E8F5E9;
  --red: #C62828; --red-bg: #FFEBEE;
  --radius: 12px; --shadow: 0 2px 12px rgba(0,0,0,0.06);
}
* { margin:0; padding:0; box-sizing:border-box; }
body {
  font-family: -apple-system, BlinkMacSystemFont, "PingFang SC", "Microsoft YaHei", sans-serif;
  background: var(--bg); color: var(--text); min-height: 100vh;
}
/* ── 登录页 ── */
.login-overlay {
  position:fixed; inset:0; background:linear-gradient(135deg,#5C0A0A 0%,#7A1212 50%,#4A0606 100%);
  display:flex; align-items:center; justify-content:center; z-index:9999;
}
.login-box {
  background:#fff; border-radius:16px; padding:36px 32px; width:360px; max-width:90vw;
  text-align:center; box-shadow:0 20px 60px rgba(0,0,0,0.3);
}
.login-box .logo-icon { font-size:48px; margin-bottom:8px; }
.login-box h2 { font-size:22px; margin-bottom:4px; color:var(--primary); }
.login-box .sub { font-size:13px; color:var(--text-light); margin-bottom:20px; }
.login-box input {
  width:100%; padding:10px 14px; border:2px solid #e8e8e8; border-radius:8px;
  font-size:15px; margin-bottom:12px; outline:none; font-family:inherit;
}
.login-box input:focus { border-color:var(--primary); }
.login-box .btn-login {
  width:100%; padding:11px; background:linear-gradient(135deg,var(--primary),#D4443F);
  color:#fff; border:none; border-radius:8px; font-size:16px; font-weight:600;
  cursor:pointer; margin-top:4px; font-family:inherit;
}
.login-box .btn-login:hover { opacity:.9; }
.login-box .err { color:var(--red); font-size:13px; margin-top:10px; }
/* ── Header ── */
.header {
  background: linear-gradient(135deg, #5C0A0A 0%, #9B1B1B 30%, #7A1212 70%, #5C0A0A 100%);
  color:#fff; padding:14px 20px; display:flex; align-items:center;
  justify-content:space-between;
  box-shadow:0 4px 24px rgba(100,8,8,0.35); position:sticky; top:0; z-index:100;
  border-bottom:2px solid rgba(201,169,110,0.55);
}
.header h1 { font-size:17px; font-weight:700; letter-spacing:2px; }
.header .logout {
  font-size:13px; opacity:.8; cursor:pointer;
  background:rgba(255,255,255,0.15); padding:5px 12px; border-radius:6px;
  border:1px solid rgba(255,255,255,0.3);
}
/* ── Tab Navigation ── */
.tabs {
  display:flex; gap:4px; background:#fff; padding:12px 20px 0;
  border-bottom:1px solid #eee; max-width:960px; margin:0 auto;
}
.tab {
  padding:10px 18px; font-size:14px; color:var(--text-light); cursor:pointer;
  border-radius:8px 8px 0 0; font-weight:600;
  border:1px solid transparent; border-bottom:none;
}
.tab:hover { color:var(--text); background:#faf6f0; }
.tab.active {
  color:var(--primary); background:#fff;
  border-color:#eee; border-bottom-color:#fff;
}
/* ── Content ── */
.panel { max-width:960px; margin:0 auto; padding:20px; }
.card {
  background:#fff; border-radius:var(--radius); padding:20px 24px;
  box-shadow:var(--shadow); margin-bottom:16px;
  position:relative; overflow:hidden;
}
.card::before { content:''; position:absolute; top:0; left:0; right:0; height:4px; }
.card.store-card::before { background:linear-gradient(90deg,var(--primary),#E87A7A); }
.card.dish-card::before { background:linear-gradient(90deg,var(--green),#81C784); }
.card.summary-card::before { background:linear-gradient(90deg,var(--gold),#E8C87A); }
.card h3 { font-size:15px; margin-bottom:16px; color:var(--text); }
/* ── Add Row ── */
.add-row { display:flex; gap:8px; margin-bottom:16px; }
.add-row input {
  flex:1; padding:9px 12px; font-size:14px; border:2px solid #e8e8e8; border-radius:8px;
  outline:none; font-family:inherit; background:#fafafa;
}
.add-row input:focus { border-color:var(--primary); background:#fff; }
.btn {
  padding:8px 16px; font-size:13px; border:none; border-radius:8px; cursor:pointer;
  font-weight:600; font-family:inherit;
}
.btn-primary {
  background:linear-gradient(135deg,var(--primary),#D4443F); color:#fff;
  box-shadow:0 2px 8px rgba(178,34,34,0.25);
}
.btn-primary:hover { transform:translateY(-1px); }
.btn-green { background:var(--green); color:#fff; }
.btn-outline { background:#fff; color:var(--primary); border:1.5px solid var(--primary); }
.btn-outline:hover { background:var(--red-bg); }
.btn-sm { padding:4px 10px; font-size:12px; }
.btn-ghost { background:transparent; color:var(--text-light); border:none; }
.btn-ghost:hover { color:var(--primary); }
/* ── Table ── */
.list-table { width:100%; border-collapse:collapse; }
.list-table th, .list-table td {
  text-align:left; padding:10px 12px; font-size:14px; border-bottom:1px solid #f5f5f5;
}
.list-table th { font-weight:600; color:var(--text-light); font-size:12px; }
td.actions { text-align:right; white-space:nowrap; }
td.actions button { margin-left:4px; }
.tag {
  display:inline-block; padding:2px 8px; border-radius:10px; font-size:11px; font-weight:600;
}
.tag-on { background:var(--green-bg); color:var(--green); }
.tag-off { background:var(--red-bg); color:var(--red); }
/* ── Inline Edit ── */
.edit-inline input {
  width:100%; padding:6px 8px; font-size:13px; border:2px solid var(--primary);
  border-radius:6px; outline:none; font-family:inherit;
}
.wh-url {
  display:block; max-width:200px; overflow:hidden; text-overflow:ellipsis;
  white-space:nowrap; font-size:12px; color:var(--text-light);
}
.wh-none { font-size:12px; color:#ccc; }
/* ── Summary ── */
.summary-grid { display:grid; grid-template-columns:1fr 1fr; gap:16px; }
@media (max-width:600px) { .summary-grid { grid-template-columns:1fr; } }
.store-tag {
  display:inline-block; padding:6px 12px; border-radius:6px;
  font-size:13px; margin:4px;
}
.store-tag.ok { background:var(--green-bg); color:var(--green); }
.store-tag.miss { background:var(--red-bg); color:var(--red); border:1px dashed var(--red); }
.report-box {
  background:#fff; border-radius:var(--radius); padding:20px 24px;
  box-shadow:var(--shadow); margin-top:16px; position:relative; overflow:hidden;
}
.report-box::before { content:''; position:absolute; top:0; left:0; right:0; height:4px;
  background:linear-gradient(90deg,var(--gold),#E8C87A); }
.report-box h3 { font-size:15px; margin-bottom:12px; }
.report-text {
  background:#f8f9fa; border:1px solid #e9ecef; border-radius:8px;
  padding:16px; font-size:14px; line-height:1.8; white-space:pre-wrap;
  color:var(--text); margin-bottom:12px;
}
/* ── Toast ── */
.toast {
  position:fixed; top:20px; left:50%; transform:translateX(-50%); z-index:9999;
  background:#333; color:#fff; padding:10px 24px; border-radius:8px;
  font-size:14px; opacity:0; transition:opacity .3s; pointer-events:none;
}
.toast.show { opacity:1; }
.toast.error { background:var(--red); }
.empty { text-align:center; color:#bbb; padding:40px; font-size:14px; }
.loading { text-align:center; color:var(--text-light); padding:40px; }
.admin-wrap { display:none; }
</style>
</head>
<body>

<div id="app">
  <div class="login-overlay" id="loginPage">
    <div class="login-box">
      <div class="logo-icon">🔑</div>
      <h2>后台管理</h2>
      <div class="sub">菜品报损系统</div>
      <input type="password" id="pwdInput" placeholder="请输入管理密码" onkeydown="if(event.key==='Enter')doLogin()">
      <button class="btn-login" onclick="doLogin()">登 录</button>
      <div class="err" id="loginErr"></div>
    </div>
  </div>

  <div class="admin-wrap" id="adminPage">
    <div class="header">
      <h1>🔑 菜品报损 · 后台管理</h1>
      <span class="logout" onclick="doLogout()">退出登录</span>
    </div>
    <div class="tabs">
      <div class="tab active" data-tab="summary" onclick="switchTab('summary')">📊 今日汇总</div>
      <div class="tab" data-tab="stores" onclick="switchTab('stores')">🏪 门店管理</div>
      <div class="tab" data-tab="dishes" onclick="switchTab('dishes')">🍆 菜品管理</div>
    </div>
    <div class="panel" id="tabContent"></div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
var API = '';
var TOKEN = localStorage.getItem('fw_token') || '';

function toast(msg, isError) {
  var el = document.getElementById('toast');
  el.textContent = msg;
  el.className = 'toast' + (isError ? ' error' : '');
  el.classList.add('show');
  setTimeout(function() { el.classList.remove('show'); }, 2000);
}

async function api(url, opts) {
  opts = opts || {};
  var headers = Object.assign({}, opts.headers || {});
  if (TOKEN) headers['x-admin-token'] = TOKEN;
  var res = await fetch(API + url, Object.assign({}, opts, { headers: headers }));
  if (res.status === 401) { doLogout(); throw new Error('登录已过期'); }
  var data = await res.json();
  if (!res.ok) throw new Error(data.error || '请求失败');
  return data;
}

// ── 登录/登出 ──
async function doLogin() {
  var pwd = document.getElementById('pwdInput').value;
  var errEl = document.getElementById('loginErr');
  errEl.textContent = '';
  try {
    var res = await fetch(API + '/api/admin/login', {
      method: 'POST', headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ password: pwd }),
    });
    var data = await res.json();
    if (data.success) {
      TOKEN = data.token;
      localStorage.setItem('fw_token', TOKEN);
      document.getElementById('loginPage').style.display = 'none';
      document.getElementById('adminPage').style.display = 'block';
      switchTab('summary');
    } else { errEl.textContent = '密码错误'; }
  } catch (e) { errEl.textContent = '登录失败：' + e.message; }
}

function doLogout() {
  TOKEN = '';
  localStorage.removeItem('fw_token');
  document.getElementById('loginPage').style.display = 'flex';
  document.getElementById('adminPage').style.display = 'none';
  document.getElementById('pwdInput').value = '';
}

if (TOKEN) {
  api('/api/admin/verify').then(function() {
    document.getElementById('loginPage').style.display = 'none';
    document.getElementById('adminPage').style.display = 'block';
    switchTab('summary');
  }).catch(function() { doLogout(); });
}

// ── Tab ──
function switchTab(name) {
  var tabs = document.querySelectorAll('.tab');
  for (var i = 0; i < tabs.length; i++) tabs[i].classList.remove('active');
  document.querySelector('.tab[data-tab="' + name + '"]').classList.add('active');
  document.getElementById('tabContent').innerHTML = '<div class="loading">加载中...</div>';
  if (name === 'summary') renderSummary();
  else if (name === 'stores') renderStores();
  else if (name === 'dishes') renderDishes();
}

// ── 今日汇总 ──
async function renderSummary() {
  var c = document.getElementById('tabContent');
  try {
    var today = new Date().toISOString().split('T')[0];
    var s = await api('/api/admin/summary?date=' + today);

    var subHtml = s.submitted.length
      ? s.submitted.map(function(x) {
          return '<span class="store-tag ok">✅' + x.store_name + '<br><small style="opacity:0.7">' + x.submit_time + '</small></span>';
        }).join('')
      : '<div style="color:#999;font-size:13px">暂无</div>';

    var missHtml = s.notSubmitted.length
      ? s.notSubmitted.map(function(x) {
          return '<span class="store-tag miss">❌' + x.name + '</span>';
        }).join('')
      : '<div style="color:#27ae60;font-size:13px">全部已提交🎉</div>';

    var rt = '';
    try { rt = (await api('/api/admin/report-text?date=' + today)).text; } catch (_) {}

    c.innerHTML =
      '<div class="summary-grid">' +
        '<div class="card summary-card"><h3>✅ 已提交门店（' + s.submitted.length + '/' + s.allStores.length + '）</h3>' + subHtml + '</div>' +
        '<div class="card summary-card"' + (s.notSubmitted.length ? ' style="border:2px solid #C62828;"' : '') + '>' +
          '<h3' + (s.notSubmitted.length ? ' style="color:#C62828;"' : '') + '>❌ 未提交门店（' + s.notSubmitted.length + '）</h3>' + missHtml +
        '</div>' +
      '</div>' +
      '<div class="report-box">' +
        '<h3>📋 企业微信群发文案</h3>' +
        '<div class="report-text" id="reportText">' + rt + '</div>' +
        '<button class="btn btn-primary btn-copy" style="padding:8px 20px;" onclick="copyReport()">📋 一键复制</button>' +
      '</div>';
    window._rt = rt;
  } catch (e) { c.innerHTML = '<div class="card"><div class="empty">加载失败：' + e.message + '</div></div>'; }
}

function copyReport() {
  if (!window._rt) return;
  navigator.clipboard.writeText(window._rt).then(function() { toast('已复制'); }, function() {
    var ta = document.createElement('textarea');
    ta.value = window._rt;
    document.body.appendChild(ta);
    ta.select();
    document.execCommand('copy');
    document.body.removeChild(ta);
    toast('已复制');
  });
}

// ── 门店管理（含门店新增） ──
async function renderStores() {
  var c = document.getElementById('tabContent');
  try {
    window._storeList = await api('/api/admin/stores');
    var rows = window._storeList.map(function(s) {
      var wh = s.webhook_url || '';
      return '<tr>' +
        '<td>' + s.id + '</td>' +
        '<td id="sn-' + s.id + '">' + s.name + '</td>' +
        '<td id="sw-' + s.id + '">' + (wh ? '<span class="wh-url" title="' + wh.replace(/"/g,'&quot;') + '">' + wh + '</span>' : '<span class="wh-none">未配置</span>') + '</td>' +
        '<td><span class="tag ' + (s.active ? 'tag-on' : 'tag-off') + '">' + (s.active ? '启用' : '停用') + '</span></td>' +
        '<td class="actions">' +
          '<button class="btn btn-outline btn-sm" onclick="editStore(' + s.id + ')">编辑</button>' +
          '<button class="btn btn-outline btn-sm" onclick="editWebhook(' + s.id + ')">🔗Webhook</button>' +
          '<button class="btn btn-outline btn-sm" onclick="testWebhook(' + s.id + ')"' + (wh ? '' : ' disabled') + '>测试</button>' +
          '<button class="btn btn-outline btn-sm" onclick="toggleStore(' + s.id + ')">' + (s.active ? '停用' : '启用') + '</button>' +
          '<button class="btn btn-ghost btn-sm" onclick="deleteStore(' + s.id + ')">删除</button>' +
        '</td>' +
      '</tr>';
    }).join('');

    c.innerHTML =
      '<div class="card store-card">' +
        '<h3>🏪 门店管理</h3>' +
        '<div style="background:#FFF9F0;border:1px solid #F5ECD7;border-radius:10px;padding:14px;margin-bottom:16px;">' +
          '<div style="font-size:13px;font-weight:600;color:#B22222;margin-bottom:8px;">➕ 新增门店</div>' +
          '<div class="add-row">' +
            '<input id="newStoreName" placeholder="输入新门店名称" onkeydown="if(event.key===\'Enter\')addStore()">' +
            '<button class="btn btn-primary" onclick="addStore()">添加门店</button>' +
          '</div>' +
        '</div>' +
        '<p style="font-size:12px;color:var(--text-light);margin-bottom:12px;">每店可配置企微机器人 Webhook，配置后汇总通知可自动推送到对应门店群。</p>' +
        '<table class="list-table">' +
          '<thead><tr><th>ID</th><th>名称</th><th>企微Webhook</th><th>状态</th><th class="actions">操作</th></tr></thead>' +
          '<tbody>' + (rows || '<tr><td colspan="5" class="empty">暂无门店</td></tr>') + '</tbody>' +
        '</table>' +
      '</div>';
  } catch (e) { c.innerHTML = '<div class="card"><div class="empty">加载失败：' + e.message + '</div></div>'; }
}

async function addStore() {
  var inp = document.getElementById('newStoreName');
  var name = inp.value.trim();
  if (!name) return toast('请输入门店名称');
  try {
    await api('/api/admin/stores', {
      method: 'POST', headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ name: name }),
    });
    inp.value = '';
    toast('添加成功');
    renderStores();
  } catch (e) { toast('添加失败：' + e.message, true); }
}

function editStore(id) {
  var store = window._storeList.find(function(s) { return s.id === id; });
  if (!store) return;
  var cell = document.getElementById('sn-' + id);
  cell.innerHTML = '<div class="edit-inline"><input id="esi_' + id + '" value="' + store.name.replace(/'/g,"\\'") + '" onkeydown="if(event.key===\'Enter\')saveStore(' + id + ')" onblur="saveStore(' + id + ')"></div>';
  setTimeout(function() {
    var el = document.getElementById('esi_' + id);
    if (el) el.focus();
  }, 50);
}

async function saveStore(id) {
  var inp = document.getElementById('esi_' + id);
  if (!inp) return;
  var name = inp.value.trim();
  if (!name) { renderStores(); return; }
  try {
    await api('/api/admin/stores/' + id, {
      method: 'PUT', headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ name: name }),
    });
    toast('修改成功');
  } catch (e) { toast('修改失败：' + e.message, true); }
  renderStores();
}

function editWebhook(id) {
  var store = window._storeList.find(function(s) { return s.id === id; });
  if (!store) return;
  var cell = document.getElementById('sw-' + id);
  if (!cell) {
    cell = document.querySelector('#sn-' + id).parentElement.querySelector('td:nth-child(3)');
    cell.id = 'sw-' + id;
  }
  cell.innerHTML = '<div class="edit-inline">' +
    '<input id="ewi_' + id + '" value="' + (store.webhook_url || '').replace(/"/g,'&quot;') + '" placeholder="https://qyapi.weixin.qq.com/..." onkeydown="if(event.key===\'Enter\')saveWebhook(' + id + ')">' +
    '<div style="margin-top:4px;display:flex;gap:6px;">' +
      '<button class="btn btn-green btn-sm" onclick="saveWebhook(' + id + ')">保存</button>' +
      '<button class="btn btn-ghost btn-sm" onclick="renderStores()">取消</button>' +
    '</div>' +
  '</div>';
  setTimeout(function() {
    var el = document.getElementById('ewi_' + id);
    if (el) el.focus();
  }, 50);
}

async function saveWebhook(id) {
  var inp = document.getElementById('ewi_' + id);
  if (!inp) return;
  var url = inp.value.trim();
  try {
    await api('/api/admin/stores/' + id + '/webhook', {
      method: 'PUT', headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ webhook_url: url }),
    });
    toast(url ? 'Webhook 已保存' : 'Webhook 已清除');
  } catch (e) { toast('保存失败：' + e.message, true); }
  renderStores();
}

async function testWebhook(id) {
  try {
    var r = await api('/api/admin/stores/' + id + '/test-webhook', { method: 'POST' });
    toast(r.success ? '✅ 测试消息发送成功！请查看企微群' : '❌' + (r.error || '发送失败'));
  } catch (e) { toast('❌' + e.message, true); }
}

async function toggleStore(id) {
  try { await api('/api/admin/stores/' + id + '/toggle', { method: 'PUT' }); toast('状态已切换'); renderStores(); }
  catch (e) { toast('操作失败：' + e.message, true); }
}

async function deleteStore(id) {
  var store = window._storeList.find(function(s) { return s.id === id; });
  if (!store) return;
  if (!confirm('确定要删除门店「' + store.name + '」吗？历史提交记录将保留。')) return;
  try { await api('/api/admin/stores/' + id, { method: 'DELETE' }); toast('已删除'); renderStores(); }
  catch (e) { toast('删除失败：' + e.message, true); }
}

// ── 菜品管理 ──
async function renderDishes() {
  var c = document.getElementById('tabContent');
  try {
    window._dishList = await api('/api/admin/dishes');
    var rows = window._dishList.map(function(d) {
      return '<tr>' +
        '<td>' + d.id + '</td>' +
        '<td id="dn-' + d.id + '">' + d.name + '</td>' +
        '<td><span class="tag ' + (d.active ? 'tag-on' : 'tag-off') + '">' + (d.active ? '启用' : '停用') + '</span></td>' +
        '<td class="actions">' +
          '<button class="btn btn-outline btn-sm" onclick="editDish(' + d.id + ')">编辑</button>' +
          '<button class="btn btn-outline btn-sm" onclick="toggleDish(' + d.id + ')">' + (d.active ? '停用' : '启用') + '</button>' +
          '<button class="btn btn-ghost btn-sm" onclick="deleteDish(' + d.id + ')">删除</button>' +
        '</td>' +
      '</tr>';
    }).join('');

    c.innerHTML =
      '<div class="card dish-card">' +
        '<h3>🍆 菜品管理</h3>' +
        '<div style="background:#F1F9F1;border:1px solid #C8E6C9;border-radius:10px;padding:14px;margin-bottom:16px;">' +
          '<div style="font-size:13px;font-weight:600;color:#2E7D32;margin-bottom:8px;">➕ 新增菜品</div>' +
          '<div class="add-row">' +
            '<input id="newDishName" placeholder="输入新菜品名称" onkeydown="if(event.key===\'Enter\')addDish()">' +
            '<button class="btn btn-green" onclick="addDish()">添加菜品</button>' +
          '</div>' +
        '</div>' +
        '<p style="font-size:12px;color:var(--text-light);margin-bottom:12px;">停用的菜品在厨师长填报端不会显示，历史数据保留。</p>' +
        '<table class="list-table">' +
          '<thead><tr><th>ID</th><th>名称</th><th>状态</th><th class="actions">操作</th></tr></thead>' +
          '<tbody>' + (rows || '<tr><td colspan="4" class="empty">暂无菜品</td></tr>') + '</tbody>' +
        '</table>' +
      '</div>';
  } catch (e) { c.innerHTML = '<div class="card"><div class="empty">加载失败：' + e.message + '</div></div>'; }
}

async function addDish() {
  var inp = document.getElementById('newDishName');
  var name = inp.value.trim();
  if (!name) return toast('请输入菜品名称');
  try {
    await api('/api/admin/dishes', {
      method: 'POST', headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ name: name }),
    });
    inp.value = '';
    toast('添加成功');
    renderDishes();
  } catch (e) { toast('添加失败：' + e.message, true); }
}

function editDish(id) {
  var dish = window._dishList.find(function(d) { return d.id === id; });
  if (!dish) return;
  var cell = document.getElementById('dn-' + id);
  cell.innerHTML = '<div class="edit-inline"><input id="edi_' + id + '" value="' + dish.name.replace(/'/g,"\\'") + '" onkeydown="if(event.key===\'Enter\')saveDish(' + id + ')" onblur="saveDish(' + id + ')"></div>';
  setTimeout(function() {
    var el = document.getElementById('edi_' + id);
    if (el) el.focus();
  }, 50);
}

async function saveDish(id) {
  var inp = document.getElementById('edi_' + id);
  if (!inp) return;
  var name = inp.value.trim();
  if (!name) { renderDishes(); return; }
  try {
    await api('/api/admin/dishes/' + id, {
      method: 'PUT', headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ name: name }),
    });
    toast('修改成功');
  } catch (e) { toast('修改失败：' + e.message, true); }
  renderDishes();
}

async function toggleDish(id) {
  try { await api('/api/admin/dishes/' + id + '/toggle', { method: 'PUT' }); toast('状态已切换'); renderDishes(); }
  catch (e) { toast('操作失败：' + e.message, true); }
}

async function deleteDish(id) {
  var dish = window._dishList.find(function(d) { return d.id === id; });
  if (!dish) return;
  if (!confirm('确定要删除菜品「' + dish.name + '」吗？')) return;
  try { await api('/api/admin/dishes/' + id, { method: 'DELETE' }); toast('已删除'); renderDishes(); }
  catch (e) { toast('删除失败：' + e.message, true); }
}
</script>
</body>
</html>
